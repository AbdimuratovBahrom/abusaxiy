<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Поиск линий электроснабжения магазинов ТЦ Abusaxiy (Ташкент). Найдите путь питания любого магазина по блоку и ряду."/>
  <meta name="theme-color" content="#1e40af"/>
  <title>Store Path Finder</title>
  <link rel="shortcut icon" href="./css/images/logo.jpg" type="image/jpeg">
  <link rel="stylesheet" href="./css/style.css"/>
</head>
<body>
  <div class="header">
    <div class="language-selector">
      <select id="languageSelect">
        <option value="ru">Русский</option>
        <option value="uz">O'zbekcha (Lotin)</option>
        <option value="uz_cyrl">Ўзбекча (Кирилл)</option>
      </select>
    </div>
    <div class="toggle-btn">
      <button id="toggle-btn" type="button">Скрыть блоки</button>
    </div>
  </div>

  <div id="blocks-container">
    <div class="container">
      <h1>Поиск линий электроснабжения магазинов</h1>

      <label for="block" class="sr-only">Выберите блок</label>
      <select id="block" aria-label="Выберите блок">
        <option value="">Выберите блок</option>
        <option value="1-блок">1-блок</option>
        <option value="2-блок">2-блок</option>
        <option value="3-блок">3-блок</option>
        <option value="Гипермаркет">Гипермаркет</option>
        <option value="Специфические объекты">Специфические объекты</option>
      </select>

      <label for="row" class="sr-only">Выберите ряд</label>
      <select id="row" disabled aria-label="Выберите ряд">
        <option value="">Выберите ряд</option>
      </select>

      <label for="store" class="sr-only">Выберите магазин</label>
      <select id="store" disabled aria-label="Выберите магазин">
        <option value="">Выберите магазин</option>
      </select>

      <div id="pathResult" aria-live="polite" aria-atomic="true"></div>

      <!-- ИИ-помощник -->
      <div class="ai-section">
        <div class="ai-header">
          <div class="ai-title-row">
            <span class="ai-icon">🤖</span>
            <h2>ИИ-Помощник</h2>
            <span class="ai-badge">AI</span>
          </div>
          <p class="ai-subtitle">Задавайте вопросы на русском или узбекском языке</p>
        </div>

        <div id="chatContainer" class="chat-container" aria-live="polite" aria-label="История чата" role="log">
          <!-- сообщения -->
        </div>

        <!-- Быстрые вопросы -->
        <div class="quick-actions" id="quickActions">
          <button class="quick-btn" data-q="Что такое ВРУ, ЩР, ЯРВ и ШО?">📖 Термины</button>
          <button class="quick-btn" data-q="Как устроено электроснабжение 1-блока?">🏢 1-блок</button>
          <button class="quick-btn" data-q="Что делать если отключился магазин?">🔧 Авария</button>
        </div>

        <div class="chat-input-row">
          <label for="aiInput" class="sr-only">Введите вопрос для ИИ-помощника</label>
          <input type="text" id="aiInput"
            placeholder="Например: путь питания магазина 47, 1-блок ряд E"
            aria-label="Введите вопрос для ИИ-помощника"
            autocomplete="off" />
          <button id="aiSendBtn">Отправить</button>
        </div>
      </div>

      <div class="case">
        <a target="_blank" href="https://abdimuratovbahrom.github.io/Find-stores_by_ShR/">Блоки 1,2,3</a>
        <a target="_blank" href="https://abdimuratovbahrom.github.io/gipermarket_stores/">Гипермаркет</a>
      </div>
    </div>
  </div>

  <script src="./js/script.js" defer></script>
</body>
</html>
